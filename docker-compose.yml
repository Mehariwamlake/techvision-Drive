version: "3.8"

services:
  mariadb:
    image: mariadb:10.8
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 123
    volumes:
      - mariadb-data:/var/lib/mysql

  redis-cache:
    image: redis:7-alpine
    restart: unless-stopped

  redis-queue:
    image: redis:7-alpine
    restart: unless-stopped

  redis-socketio:
    image: redis:7-alpine
    restart: unless-stopped

  configurator:
    image: frappe/frappe-worker:latest
    restart: "no"
    depends_on:
      - mariadb
      - redis-cache
      - redis-queue
      - redis-socketio
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
    environment:
      DB_HOST: mariadb
      REDIS_CACHE: redis://redis-cache:6379
      REDIS_QUEUE: redis://redis-queue:6379
      REDIS_SOCKETIO: redis://redis-socketio:6379
    command: >
      bash -c "
      if [ ! -f /home/frappe/frappe-bench/sites/common_site_config.json ]; then
        echo 'Initializing bench...';
        bench set-config -g db_host mariadb;
        bench set-config -g redis_cache redis://redis-cache:6379;
        bench set-config -g redis_queue redis://redis-queue:6379;
        bench set-config -g redis_socketio redis://redis-socketio:6379;

        bench new-site drive.local --admin-password=admin --db-root-password=123;

        bench get-app drive https://github.com/frappe/drive;
        bench --site drive.local install-app drive;
        bench use drive.local;
      else
        echo 'Already initialized, skipping...';
      fi
      "

  backend:
    image: frappe/frappe-worker:latest
    restart: unless-stopped
    depends_on:
      - configurator
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
    environment:
      DB_HOST: mariadb
      REDIS_CACHE: redis://redis-cache:6379
      REDIS_QUEUE: redis://redis-queue:6379
      REDIS_SOCKETIO: redis://redis-socketio:6379

  frontend:
    image: frappe/frappe-nginx:latest
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8001:8080"
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
    environment:
      BACKEND: backend:8000
      SOCKETIO: backend:9000

  queue-default:
    image: frappe/frappe-worker:latest
    command: bench worker --queue default
    restart: unless-stopped
    depends_on:
      - backend
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs

  scheduler:
    image: frappe/frappe-worker:latest
    command: bench schedule
    restart: unless-stopped
    depends_on:
      - backend
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs

volumes:
  mariadb-data:
  sites:
  logs: